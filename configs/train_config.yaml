# Model
image_size: 128
in_channels: 3
base_channels: 128
channel_mult: [1, 2, 3, 4]
num_res_blocks: 2
attn_resolutions: [16, 8]
num_heads: 4

# Diffusion
num_timesteps: 1000
beta_start: 1.0e-4
beta_end: 0.02

# Training
batch_size: 8
learning_rate: 1.0e-4
num_epochs: 100
warmup_steps: 1000
ema_decay: 0.9999
mixed_precision: true
gradient_clip: 1.0

# Logging
wandb_project: "controlnet-depth-pipeline"
log_every_n_steps: 100
sample_every_n_epochs: 5
save_every_n_epochs: 10

# Data
data_dir: "data/nyu_depth_v2"
num_workers: 4

# Checkpoint
checkpoint_dir: "checkpoints"
